  <path d="M40,180 L250,60 L460,180 Z" fill="url(#roofSlate)"/>
  <!-- Shingle rows (horizontal lines) -->
  <g stroke="#3a3a38" stroke-width="1">
    <line x1="85" y1="168" x2="415" y2="168"/>
    <line x1="76" y1="157" x2="424" y2="157"/>
    <line x1="67" y1="146" x2="433" y2="146"/>
    <line x1="110" y1="135" x2="390" y2="135"/>
    <line x1="133" y1="124" x2="367" y2="124"/>
    <line x1="157" y1="113" x2="343" y2="113"/>
    <line x1="181" y1="102" x2="319" y2="102"/>
    <line x1="204" y1="91" x2="296" y2="91"/>
    <line x1="226" y1="81" x2="274" y2="81"/>
  </g>
  <!-- Shingle stagger lines (vertical) -->
  <g stroke="#3a3a38" stroke-width="0.5">
    <line x1="108" y1="168" x2="100" y2="157"/><line x1="141" y1="168" x2="133" y2="157"/>
    <line x1="174" y1="168" x2="166" y2="157"/><line x1="207" y1="168" x2="199" y2="157"/>
    <line x1="240" y1="168" x2="232" y2="157"/><line x1="273" y1="168" x2="265" y2="157"/>
    <line x1="306" y1="168" x2="298" y2="157"/><line x1="339" y1="168" x2="331" y2="157"/>
    <line x1="372" y1="168" x2="364" y2="157"/>
  </g>
  <!-- Ridge cap (intact) -->
  <path d="M230,62 L250,58 L270,62" fill="#6a6a68" stroke="#555" stroke-width="1"/>
  <path d="M225,68 L250,62 L275,68" fill="#6a6a68" stroke="#555" stroke-width="0.8"/>
  <path d="M215,75 L250,65 L285,75" fill="#6a6a68" stroke="#555" stroke-width="0.8"/>
  <!-- Gutters (intact) -->
  <rect x="40" y="178" width="421" height="8" fill="#888" rx="2"/>
  <!-- Windows -->
  <rect x="120" y="210" width="70" height="55" fill="#aac8e0" stroke="#c8c0b0" stroke-width="2" rx="1"/>
  <line x1="155" y1="210" x2="155" y2="265" stroke="#c8c0b0" stroke-width="1.5"/>
  <line x1="120" y1="237" x2="190" y2="237" stroke="#c8c0b0" stroke-width="1.5"/>
  <rect x="310" y="210" width="70" height="55" fill="#aac8e0" stroke="#c8c0b0" stroke-width="2" rx="1"/>
  <line x1="345" y1="210" x2="345" y2="265" stroke="#c8c0b0" stroke-width="1.5"/>
  <line x1="310" y1="237" x2="380" y2="237" stroke="#c8c0b0" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="205" y="270" width="90" height="90" fill="#c8a060" stroke="#a08040" stroke-width="2" rx="2"/>
  <circle cx="285" cy="315" r="5" fill="#888"/>
  <!-- Chimney -->
  <rect x="290" y="95" width="35" height="75" fill="#b8a08a"/>
  <rect x="285" y="90" width="45" height="10" fill="#c8b09a" rx="1"/>
  <!-- Label -->
  <rect x="0" y="0" width="500" height="18" fill="rgba(0,0,0,0.5)"/>
  <text x="250" y="13" fill="#fff" font-family="Arial" font-size="11" text-anchor="middle" font-weight="bold">PRE-STORM — Intact Roof — Good Condition — March 5, 2026</text>
</svg>
