<svg xmlns="http://www.w3.org/2000/svg" width="500" height="360" viewBox="0 0 500 360">
  <defs>
    <linearGradient id="skyB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a80c8"/>
      <stop offset="100%" stop-color="#7ab0e0"/>
    </linearGradient>
    <linearGradient id="roofSlate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a5a58"/>
      <stop offset="100%" stop-color="#484846"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="500" height="360" fill="url(#skyB)"/>
  <!-- Clouds -->
  <ellipse cx="100" cy="60" rx="70" ry="28" fill="rgba(255,255,255,0.7)"/>
  <ellipse cx="150" cy="50" rx="50" ry="22" fill="rgba(255,255,255,0.8)"/>
  <ellipse cx="370" cy="70" rx="60" ry="25" fill="rgba(255,255,255,0.65)"/>
  <ellipse cx="420" cy="58" rx="45" ry="20" fill="rgba(255,255,255,0.75)"/>
  <!-- House body -->
