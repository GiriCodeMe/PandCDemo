  <rect x="0" y="90" width="180" height="50" fill="#e8e4dc"/>
  <rect x="320" y="90" width="180" height="50" fill="#e8e4dc"/>
  <g stroke="#d8d4cc" stroke-width="0.5">
    <line x1="0" y1="100" x2="180" y2="100"/><line x1="0" y1="112" x2="180" y2="112"/>
    <line x1="0" y1="124" x2="180" y2="124"/>
    <line x1="20" y1="90" x2="20" y2="140"/><line x1="40" y1="90" x2="40" y2="140"/>
    <line x1="60" y1="90" x2="60" y2="140"/><line x1="80" y1="90" x2="80" y2="140"/>
    <line x1="100" y1="90" x2="100" y2="140"/><line x1="120" y1="90" x2="120" y2="140"/>
    <line x1="140" y1="90" x2="140" y2="140"/><line x1="160" y1="90" x2="160" y2="140"/>
    <line x1="320" y1="100" x2="500" y2="100"/><line x1="320" y1="112" x2="500" y2="112"/>
    <line x1="320" y1="124" x2="500" y2="124"/>
    <line x1="340" y1="90" x2="340" y2="140"/><line x1="360" y1="90" x2="360" y2="140"/>
    <line x1="380" y1="90" x2="380" y2="140"/><line x1="400" y1="90" x2="400" y2="140"/>
    <line x1="420" y1="90" x2="420" y2="140"/><line x1="440" y1="90" x2="440" y2="140"/>
    <line x1="460" y1="90" x2="460" y2="140"/><line x1="480" y1="90" x2="480" y2="140"/>
  </g>
  <!-- Label -->
  <rect x="0" y="0" width="500" height="18" fill="rgba(0,0,0,0.55)"/>
  <text x="250" y="13" fill="#fff" font-family="Arial" font-size="11" text-anchor="middle" font-weight="bold">PRE-FIRE — Modern Kitchen in Excellent Condition — March 8, 2026</text>
</svg>
