  <rect x="330" y="155" width="60" height="35" fill="#c0b8a8" rx="3" stroke="#a8a098" stroke-width="1"/>
  <rect x="333" y="158" width="54" height="24" fill="#303030" rx="1"/>
  <circle cx="375" cy="180" r="5" fill="#888"/>
  <!-- Right lower cabinets -->
  <rect x="320" y="148" width="180" height="92" fill="#f8f8f6" stroke="#e0ddd8" stroke-width="1" rx="2"/>
  <rect x="325" y="152" width="82" height="82" fill="#fff" stroke="#e8e5e0" stroke-width="0.5" rx="1"/>
  <rect x="413" y="152" width="82" height="82" fill="#fff" stroke="#e8e5e0" stroke-width="0.5" rx="1"/>
  <rect x="362" y="190" width="10" height="18" fill="#c8c0b0" rx="4"/>
  <rect x="451" y="190" width="10" height="18" fill="#c8c0b0" rx="4"/>
