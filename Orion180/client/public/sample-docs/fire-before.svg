<svg xmlns="http://www.w3.org/2000/svg" width="500" height="360" viewBox="0 0 500 360">
  <defs>
    <linearGradient id="kwall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0ea"/>
      <stop offset="100%" stop-color="#e8e0d5"/>
    </linearGradient>
    <linearGradient id="kfloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8c0b4"/>
      <stop offset="100%" stop-color="#b0a898"/>
    </linearGradient>
  </defs>
  <!-- Wall -->
  <rect width="500" height="360" fill="url(#kwall)"/>
  <!-- Floor (tile) -->
  <rect x="0" y="240" width="500" height="120" fill="url(#kfloor)"/>
