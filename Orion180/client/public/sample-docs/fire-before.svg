  <g stroke="#bbb" stroke-width="0.8">
    <line x1="0" y1="260" x2="500" y2="260"/><line x1="0" y1="280" x2="500" y2="280"/>
    <line x1="0" y1="300" x2="500" y2="300"/><line x1="0" y1="320" x2="500" y2="320"/>
    <line x1="0" y1="340" x2="500" y2="340"/>
    <line x1="50" y1="240" x2="50" y2="360"/><line x1="100" y1="240" x2="100" y2="360"/>
    <line x1="150" y1="240" x2="150" y2="360"/><line x1="200" y1="240" x2="200" y2="360"/>
    <line x1="250" y1="240" x2="250" y2="360"/><line x1="300" y1="240" x2="300" y2="360"/>
    <line x1="350" y1="240" x2="350" y2="360"/><line x1="400" y1="240" x2="400" y2="360"/>
    <line x1="450" y1="240" x2="450" y2="360"/>
  </g>
  <!-- Modern white upper cabinets -->
  <rect x="0" y="15" width="200" height="90" fill="#f8f8f6" stroke="#e0ddd8" stroke-width="1" rx="2"/>
  <rect x="5" y="19" width="92" height="82" fill="#fff" stroke="#e8e5e0" stroke-width="0.5" rx="1"/>
  <rect x="103" y="19" width="92" height="82" fill="#fff" stroke="#e8e5e0" stroke-width="0.5" rx="1"/>
  <rect x="46" y="56" width="10" height="16" fill="#c8c0b0" rx="4"/>
  <rect x="149" y="56" width="10" height="16" fill="#c8c0b0" rx="4"/>
  <rect x="300" y="15" width="200" height="90" fill="#f8f8f6" stroke="#e0ddd8" stroke-width="1" rx="2"/>
  <rect x="305" y="19" width="92" height="82" fill="#fff" stroke="#e8e5e0" stroke-width="0.5" rx="1"/>
  <rect x="403" y="19" width="92" height="82" fill="#fff" stroke="#e8e5e0" stroke-width="0.5" rx="1"/>
  <rect x="349" y="56" width="10" height="16" fill="#c8c0b0" rx="4"/>
  <rect x="447" y="56" width="10" height="16" fill="#c8c0b0" rx="4"/>
  <!-- Range hood -->
  <rect x="205" y="10" width="90" height="55" fill="#d0d0cc" rx="3"/>
  <rect x="195" y="60" width="110" height="18" fill="#c0c0bc" rx="2"/>
  <!-- Lower cabinets -->
  <rect x="0" y="148" width="180" height="92" fill="#f8f8f6" stroke="#e0ddd8" stroke-width="1" rx="2"/>
  <rect x="5" y="152" width="83" height="82" fill="#fff" stroke="#e8e5e0" stroke-width="0.5" rx="1"/>
  <rect x="93" y="152" width="82" height="82" fill="#fff" stroke="#e8e5e0" stroke-width="0.5" rx="1"/>
  <rect x="42" y="190" width="10" height="18" fill="#c8c0b0" rx="4"/>
  <rect x="130" y="190" width="10" height="18" fill="#c8c0b0" rx="4"/>
  <!-- Stove/range -->
