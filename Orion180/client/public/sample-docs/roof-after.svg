<svg xmlns="http://www.w3.org/2000/svg" width="500" height="360" viewBox="0 0 500 360">
  <defs>
    <linearGradient id="stormSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3040"/>
      <stop offset="100%" stop-color="#4a5060"/>
    </linearGradient>
    <linearGradient id="roofDmg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#484846"/>
      <stop offset="100%" stop-color="#3a3a38"/>
    </linearGradient>
  </defs>
  <!-- Storm sky -->
  <rect width="500" height="360" fill="url(#stormSky)"/>
  <!-- Storm clouds -->
  <ellipse cx="120" cy="55" rx="100" ry="40" fill="#3a3a48"/>
  <ellipse cx="80" cy="45" rx="70" ry="30" fill="#404050"/>
  <ellipse cx="380" cy="50" rx="90" ry="38" fill="#3a3a48"/>
  <ellipse cx="440" cy="40" rx="60" ry="28" fill="#404050"/>
  <!-- Rain -->
  <g stroke="rgba(180,200,230,0.4)" stroke-width="1">
    <line x1="50" y1="0" x2="40" y2="50"/><line x1="100" y1="0" x2="90" y2="50"/>
    <line x1="150" y1="0" x2="140" y2="50"/><line x1="200" y1="0" x2="190" y2="50"/>
    <line x1="250" y1="0" x2="240" y2="50"/><line x1="300" y1="0" x2="290" y2="50"/>
    <line x1="350" y1="0" x2="340" y2="50"/><line x1="400" y1="0" x2="390" y2="50"/>
    <line x1="450" y1="0" x2="440" y2="50"/><line x1="75" y1="10" x2="65" y2="60"/>
    <line x1="175" y1="10" x2="165" y2="60"/><line x1="275" y1="10" x2="265" y2="60"/>
    <line x1="375" y1="10" x2="365" y2="60"/><line x1="475" y1="10" x2="465" y2="60"/>
  </g>
  <!-- House body -->
  <rect x="60" y="180" width="380" height="180" fill="#d8d0c0"/>
  <!-- Roof main surface (damaged) -->
  <path d="M40,180 L250,60 L460,180 Z" fill="url(#roofDmg)"/>
  <!-- Remaining shingles -->
  <g stroke="#2a2a28" stroke-width="1">
    <line x1="85" y1="168" x2="415" y2="168"/>
    <line x1="76" y1="157" x2="424" y2="157"/>
    <line x1="67" y1="146" x2="433" y2="146"/>
  </g>
  <!-- Missing shingles area (exposed decking) -->
  <rect x="155" y="90" width="80" height="55" fill="#8B6914"/>
  <rect x="240" y="78" width="60" height="40" fill="#7a5c10"/>
  <rect x="90" y="145" width="50" height="22" fill="#8B6914"/>
  <!-- Emergency tarp -->
  <polygon points="145,85 330,85 325,150 150,150" fill="rgba(40,80,200,0.5)" stroke="#6090ff" stroke-width="2"/>
  <!-- Tarp securing lines -->
  <line x1="150" y1="150" x2="140" y2="170" stroke="#4a70e0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="325" y1="150" x2="335" y2="170" stroke="#4a70e0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="240" y="122" fill="rgba(255,255,255,0.8)" font-family="Arial" font-size="10" text-anchor="middle" font-weight="bold">EMERGENCY TARP</text>
  <!-- Missing ridge caps -->
  <path d="M245,65 L250,60 L255,65" fill="#3a3a38" stroke="#2a2a28" stroke-width="0.5"/>
  <!-- Gap in ridge -->
  <rect x="256" y="62" width="30" height="6" fill="#8B6914"/>
  <rect x="200" y="68" width="20" height="5" fill="#8B6914"/>
  <!-- Damaged gutter section -->
  <rect x="40" y="178" width="310" height="8" fill="#888" rx="2"/>
  <rect x="350" y="180" width="110" height="6" fill="#555" rx="1" opacity="0.7"/>
  <rect x="350" y="186" width="40" height="12" fill="#555" rx="1" transform="rotate(10 370 192)"/>
  <!-- Hail impact marks on remaining shingles -->
  <circle cx="100" cy="163" r="4" fill="rgba(80,80,80,0.5)" stroke="#444" stroke-width="0.8"/>
  <circle cx="200" cy="160" r="5" fill="rgba(80,80,80,0.5)" stroke="#444" stroke-width="0.8"/>
  <circle cx="380" cy="165" r="4" fill="rgba(80,80,80,0.5)" stroke="#444" stroke-width="0.8"/>
  <circle cx="420" cy="158" r="3" fill="rgba(80,80,80,0.5)" stroke="#444" stroke-width="0.8"/>
  <!-- NWS badge -->
  <rect x="10" y="190" width="130" height="55" fill="rgba(0,20,60,0.7)" rx="5" stroke="rgba(80,130,240,0.5)" stroke-width="1"/>
  <text x="75" y="206" fill="#80b0ff" font-family="Arial" font-size="9" text-anchor="middle" font-weight="bold">NWS CONFIRMED</text>
  <text x="75" y="220" fill="#ccc" font-family="Arial" font-size="8" text-anchor="middle">Winds: 65 mph sustained</text>
  <text x="75" y="232" fill="#ccc" font-family="Arial" font-size="8" text-anchor="middle">Hail: 0.9" diameter</text>
  <text x="75" y="244" fill="#80e080" font-family="Arial" font-size="8" text-anchor="middle">Mar 8, 2026 — Houston TX</text>
  <!-- Windows (intact) -->
  <rect x="120" y="210" width="70" height="55" fill="#8090a0" stroke="#c8c0b0" stroke-width="2" rx="1"/>
  <rect x="310" y="210" width="70" height="55" fill="#8090a0" stroke="#c8c0b0" stroke-width="2" rx="1"/>
  <!-- Door -->
  <rect x="205" y="270" width="90" height="90" fill="#b89048" stroke="#906030" stroke-width="2" rx="2"/>
  <!-- Label -->
  <rect x="0" y="0" width="500" height="18" fill="rgba(160,100,0,0.75)"/>
  <text x="250" y="13" fill="#fff" font-family="Arial" font-size="11" text-anchor="middle" font-weight="bold">POST-STORM — Wind &amp; Hail Damage — March 8, 2026 — Missing Shingles, Emergency Tarp</text>
</svg>
