name: PetLife AI Demo CI

on:
  push:
    branches: [main]
    paths:
      - 'PetLife-ai-demo/**'
      - '.github/workflows/petlife-demo-ci.yml'
  pull_request:
    paths:
      - 'PetLife-ai-demo/**'
      - '.github/workflows/petlife-demo-ci.yml'

jobs:
  build-client:
    name: Client — Test & Vite Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PetLife-ai-demo/client

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: PetLife-ai-demo/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=low

      - name: Run component tests (Vitest)
        run: npm test

      - name: Build (vite build)
        run: npm run build

      - name: Verify dist output
        run: |
          echo "Build output:"
          ls -lh dist/
          [ -f dist/index.html ] && echo "  OK: dist/index.html present" || { echo "  FAIL: dist/index.html missing"; exit 1; }

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: petlife-client-dist
          path: PetLife-ai-demo/client/dist/
          retention-days: 7

  test-server:
    name: Server — Unit & Regression Tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PetLife-ai-demo/server

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: PetLife-ai-demo/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=low

      - name: Run unit + regression tests (Jest)
        run: npm test -- --forceExit

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build-client, test-server]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: PetLife-ai-demo/e2e/package-lock.json

      - name: Install server dependencies
        working-directory: PetLife-ai-demo/server
        run: npm ci

      - name: Install client dependencies
        working-directory: PetLife-ai-demo/client
        run: npm ci

      - name: Install e2e dependencies
        working-directory: PetLife-ai-demo/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: PetLife-ai-demo/e2e
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: PetLife-ai-demo/e2e
        env:
          CI: true
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: PetLife-ai-demo/e2e/playwright-report/
          retention-days: 7

  structure-check:
    name: Project Structure Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Verify client pages exist
        run: |
          pages=(
            "PetLife-ai-demo/client/src/pages/Dashboard.jsx"
            "PetLife-ai-demo/client/src/pages/Billing.jsx"
            "PetLife-ai-demo/client/src/pages/Claims.jsx"
            "PetLife-ai-demo/client/src/pages/Quote.jsx"
            "PetLife-ai-demo/client/src/pages/Underwriting.jsx"
            "PetLife-ai-demo/client/src/pages/FNOL.jsx"
            "PetLife-ai-demo/client/src/pages/Reports.jsx"
          )
          for f in "${pages[@]}"; do
            [ -f "$f" ] && echo "  OK: $f" || { echo "  MISSING: $f"; exit 1; }
          done

      - name: Verify components exist
        run: |
          components=(
            "PetLife-ai-demo/client/src/components/Layout.jsx"
            "PetLife-ai-demo/client/src/components/Sidebar.jsx"
            "PetLife-ai-demo/client/src/components/TopNav.jsx"
            "PetLife-ai-demo/client/src/components/PawspectChat.jsx"
          )
          for f in "${components[@]}"; do
            [ -f "$f" ] && echo "  OK: $f" || { echo "  MISSING: $f"; exit 1; }
          done

      - name: Verify .env.example (no real .env committed)
        run: |
          [ -f "PetLife-ai-demo/server/.env.example" ] && echo "  OK: .env.example present"
          [ ! -f "PetLife-ai-demo/server/.env" ] && echo "  OK: .env not committed" || { echo "  FAIL: .env should not be committed"; exit 1; }
